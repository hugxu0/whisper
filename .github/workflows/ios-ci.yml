name: iOS CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ios-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    runs-on: macos-15
    timeout-minutes: 30
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer
      HOMEBREW_NO_AUTO_UPDATE: "1"

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Show Apple toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Resolve Swift package dependencies
        run: swift package resolve

      - name: Run Swift package tests
        run: swift test --parallel

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Xcode package dependencies
        run: |
          xcodebuild \
            -project Whisper.xcodeproj \
            -scheme Whisper \
            -resolvePackageDependencies

      - name: Build for iOS Simulator
        run: |
          mkdir -p build-artifacts
          set -o pipefail
          xcodebuild \
            -project Whisper.xcodeproj \
            -scheme Whisper \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath "$RUNNER_TEMP/WhisperDerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            clean build | tee build-artifacts/xcodebuild.log

      - name: Capture chat acceptance screenshots
        run: |
          set -euo pipefail
          APP_PATH="$RUNNER_TEMP/WhisperDerivedData/Build/Products/Debug-iphonesimulator/Whisper.app"
          test -d "$APP_PATH"

          first_device() {
            local family="$1"
            xcrun simctl list devices available -j | python3 -c '
          import json, sys
          family = sys.argv[1]
          devices = json.load(sys.stdin)["devices"]
          for runtime in devices.values():
              for device in runtime:
                  if family in device["name"] and device.get("isAvailable", False):
                      print(device["udid"])
                      raise SystemExit(0)
          raise SystemExit(1)
          ' "$family"
          }

          capture_chat() {
            local udid="$1"
            local output="$2"
            xcrun simctl boot "$udid"
            xcrun simctl bootstatus "$udid" -b
            xcrun simctl install "$udid" "$APP_PATH"
            xcrun simctl status_bar "$udid" override --time 09:41 --batteryState charged --batteryLevel 87
            xcrun simctl launch "$udid" com.whisper.ios \
              -WhisperChatAcceptancePreview -WhisperOpenChatDetail
            sleep 4
            xcrun simctl io "$udid" screenshot "build-artifacts/$output"
            xcrun simctl shutdown "$udid"
          }

          capture_chat "$(first_device iPhone)" chat-iphone.png
          capture_chat "$(first_device iPad)" chat-ipad.png

      - name: Upload chat acceptance screenshots
        uses: actions/upload-artifact@v7
        with:
          name: chat-acceptance-screenshots-${{ github.run_number }}
          path: |
            build-artifacts/chat-iphone.png
            build-artifacts/chat-ipad.png
          if-no-files-found: error
          retention-days: 7

      - name: Archive unsigned device app
        run: |
          set -euo pipefail
          set -o pipefail
          ARCHIVE_PATH="$RUNNER_TEMP/Whisper-unsigned.xcarchive"
          rm -rf build-artifacts/unsigned "$ARCHIVE_PATH"
          mkdir -p build-artifacts/unsigned/Payload

          xcodebuild \
            -project Whisper.xcodeproj \
            -scheme Whisper \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | tee build-artifacts/unsigned-archive.log

          APP_PATH="$ARCHIVE_PATH/Products/Applications/Whisper.app"
          test -d "$APP_PATH"
          CONFIGURED_BASE_URL="$(/usr/libexec/PlistBuddy -c 'Print:WhisperAPIBaseURL' "$APP_PATH/Info.plist")"
          test "$CONFIGURED_BASE_URL" = "https://hoo66.top"
          test ! -d "$APP_PATH/_CodeSignature"
          printf 'Verified archived WhisperAPIBaseURL=%s\n' "$CONFIGURED_BASE_URL"
          cp -R "$APP_PATH" build-artifacts/unsigned/Payload/Whisper.app
          (cd build-artifacts/unsigned && /usr/bin/zip -qry ../Whisper-unsigned.ipa Payload)

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v7
        with:
          name: whisper-unsigned-ipa-${{ github.run_number }}
          path: build-artifacts/Whisper-unsigned.ipa
          if-no-files-found: error
          retention-days: 7

      - name: Upload failed build log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ios-build-log
          path: build-artifacts/xcodebuild.log
          if-no-files-found: ignore
          retention-days: 7
